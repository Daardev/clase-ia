<section class="hero-layout" aria-label="Hero">
  <div class="hero-layout__content">
    <h1 class="hero-layout__title">{{title}}</h1>
    <p class="hero-layout__subtitle">{{subtitle}}</p>

    <div class="hero-layout__actions">
      <a class="hero-layout__cta hero-layout__cta--primary" href="{{primary_cta_url}}">{{primary_cta_label}}</a>
      <a class="hero-layout__cta hero-layout__cta--secondary" href="{{secondary_cta_url}}">{{secondary_cta_label}}</a>
    </div>
  </div>

  <div class="hero-layout__media">
    <img class="hero-layout__image" src="{{hero_image_url}}" alt="{{hero_image_alt}}" />
  </div>
</section>
